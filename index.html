<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body{font-family:sans-serif; padding:20px; text-align:center;} button{background:#28a745; color:white; padding:10px; border:none; border-radius:5px; margin:10px; cursor:pointer;}</style>
</head>
<body>
    <h2>🛒 प्रियांशु स्टोर</h2>
    <div><h3>आशीर्वाद आटा 5kg</h3><p>₹250</p><button onclick="order('आशीर्वाद आटा 5kg', 250)">Add to Cart</button></div>
    <div><h3>फॉर्च्यून तेल 1L</h3><p>₹175</p><button onclick="order('फॉर्च्यून तेल 1L', 175)">Add to Cart</button></div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function order(name, price) { tg.sendData(JSON.stringify({item: name, price: price})); tg.close(); }
    </script>
</body>
</html>
